<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Edu_AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
}

.header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#3498db;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:5px;
cursor:pointer;
}

.result{
font-size:18px;
margin:8px 0;
}

canvas{
margin-top:20px;
}

</style>

</head>


<body>

<div class="header">
Edu_AI – AI Student Performance Dashboard
</div>

<div class="container">

<!-- Input Section -->

<div class="card">

<h2>Student Input</h2>

<label>Attendance (%)</label>
<input type="number" id="attendance">

<label>Assignment Score</label>
<input type="number" id="assignment">

<label>Quiz Score</label>
<input type="number" id="quiz">

<label>Study Hours</label>
<input type="number" id="study_hours">

<button onclick="predict()">Analyze Student</button>

</div>



<!-- Result Section -->

<div class="card">

<h2>AI Analysis Result</h2>

<div class="result">
Predicted Score: <span id="score">--</span>
</div>

<div class="result">
Performance Level: <span id="performance">--</span>
</div>

<div class="result">
Weak Area: <span id="weak">--</span>
</div>

<div class="result">
Risk Level: <span id="risk">--</span>
</div>

<div class="result">
Suggestion: <span id="suggestion">--</span>
</div>

</div>

</div>


<!-- Charts -->

<div style="width:90%;margin:auto;margin-top:30px">

<div class="card">
<h2>Performance Comparison</h2>
<canvas id="performanceChart"></canvas>
</div>

<div class="card">
<h2>Predicted Score Analysis</h2>
<canvas id="scoreChart"></canvas>
</div>

</div>



<script>

let performanceChart;
let scoreChart;

function predict(){

let attendance=document.getElementById("attendance").value;
let assignment=document.getElementById("assignment").value;
let quiz=document.getElementById("quiz").value;
let study_hours=document.getElementById("study_hours").value;


fetch("http://127.0.0.1:5000/predict",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

attendance:attendance,
assignment:assignment,
quiz:quiz,
study_hours:study_hours

})

})

.then(response=>response.json())

.then(data=>{

document.getElementById("score").innerText=data.predicted_score;
document.getElementById("performance").innerText=data.performance_level;
document.getElementById("weak").innerText=data.weak_area;
document.getElementById("risk").innerText=data.risk_level;
document.getElementById("suggestion").innerText=data.suggestion;


createPerformanceChart(attendance,assignment,quiz);
createScoreChart(data.predicted_score);

})

}



function createPerformanceChart(attendance,assignment,quiz){

let ctx=document.getElementById("performanceChart");

if(performanceChart){
performanceChart.destroy();
}

performanceChart=new Chart(ctx,{

type:"bar",

data:{
labels:["Attendance","Assignment","Quiz"],

datasets:[{

label:"Student Performance",

data:[attendance,assignment,quiz],

backgroundColor:["#3498db","#2ecc71","#e74c3c"]

}]
}

})

}



function createScoreChart(score){

let ctx=document.getElementById("scoreChart");

if(scoreChart){
scoreChart.destroy();
}

scoreChart=new Chart(ctx,{

type:"doughnut",

data:{

labels:["Predicted Score","Remaining"],

datasets:[{

data:[score,100-score],

backgroundColor:["#27ae60","#ecf0f1"]

}]

}

})

}

</script>

</body>

</html>
